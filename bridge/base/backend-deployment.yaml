#! backend-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
    namespace: slms
    labels:
        com.docker.compose.project: slms
        com.docker.compose.service: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: slms
            com.docker.compose.service: backend
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: slms
                com.docker.compose.service: backend
                com.docker.compose.network.slms-net: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: slms-backend
                  image: slms-backend
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: ALERT_FROM
                      value: "slms@example.com"
                    - name: ALERT_TO
                      value: "admin@example.com"
                    - name: ENABLE_EMAIL
                      value: "false"
                    - name: ENABLE_GEOIP
                      value: "false"
                    - name: ENABLE_TELEGRAM
                      value: "false"
                    - name: JWT_ALGORITHM
                      value: "HS256"
                    - name: JWT_EXPIRE_MINUTES
                      value: "60"
                    - name: JWT_SECRET
                      value: "dev-secret-change-in-production-use-64-chars-minimum"
                    - name: MAXMIND_LICENSE_KEY
                      value: ""
                    - name: ML_CONTAMINATION
                      value: "0.05"
                    - name: ML_MODEL_DIR
                      value: "/app/ml_data"
                    - name: ML_RETRAIN_INTERVAL_HOURS
                      value: "6"
                    - name: MONGO_PASSWORD
                      value: "slmspassword"
                    - name: MONGO_URL
                      value: "mongodb://slms:slmspassword@mongo:27017/slms?authSource=admin"
                    - name: MONGO_USER
                      value: "slms"
                    - name: POSTGRES_PASSWORD
                      value: "slmspassword"
                    - name: POSTGRES_URL
                      value: "postgresql+asyncpg://slms:slmspassword@postgres:5432/slms"
                    - name: POSTGRES_USER
                      value: "slms"
                    - name: REDIS_URL
                      value: "redis://redis:6379"
                    - name: SMTP_HOST
                      value: "smtp.gmail.com"
                    - name: SMTP_PASSWORD
                      value: ""
                    - name: SMTP_PORT
                      value: "587"
                    - name: SMTP_USER
                      value: ""
                    - name: TELEGRAM_BOT_TOKEN
                      value: ""
                    - name: TELEGRAM_CHAT_ID
                      value: ""
                  ports:
                    - name: backend-8000
                      containerPort: 8000
                  volumeMounts:
                    - name: app-ml-data
                      mountPath: /app/ml_data
                    - name: app-geoip
                      mountPath: /app/geoip
            volumes:
                - name: app-ml-data
                  persistentVolumeClaim:
                    claimName: backend-ml-models
                - name: app-geoip
                  persistentVolumeClaim:
                    claimName: backend-geoip-data
